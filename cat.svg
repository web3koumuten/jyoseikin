<svg viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fg" cx="0.45" cy="0.38" r="0.62" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#b4c2ce"/>
      <stop offset="100%" stop-color="#8094a8"/>
    </radialGradient>
    <radialGradient id="bg" cx="0.45" cy="0.35" r="0.65" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c8d4dc"/>
      <stop offset="100%" stop-color="#9aaab8"/>
    </radialGradient>
    <radialGradient id="eg" cx="0.3" cy="0.28" r="0.78" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#354575"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </radialGradient>
    <radialGradient id="belly" cx="0.5" cy="0.4" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#dde4ea"/>
      <stop offset="100%" stop-color="#c2cdd6"/>
    </radialGradient>
  </defs>

  <!-- tail -->
  <path d="M62 88 Q80 78 77 62 Q74 52 64 58" stroke="#8094a8" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="40" cy="78" rx="26" ry="17" fill="url(#bg)"/>

  <!-- belly -->
  <ellipse cx="40" cy="80" rx="14" ry="10" fill="url(#belly)"/>

  <!-- right arm (resting) -->
  <path d="M63 71 Q74 75 72 84 Q70 90 62 87" fill="url(#bg)"/>
  <!-- right paw -->
  <ellipse cx="65" cy="87" rx="5" ry="3.5" fill="#c4a8bc"/>

  <!-- left arm (waving up) -->
  <path d="M17 65 Q3 50 9 38 Q13 31 22 41 Q29 51 24 65" fill="url(#bg)"/>
  <!-- paw pads waving -->
  <ellipse cx="10" cy="35" rx="5.5" ry="5" fill="#c4a8bc"/>
  <circle cx="5.5" cy="30" r="3" fill="#c4a8bc"/>
  <circle cx="10" cy="28" r="3" fill="#c4a8bc"/>
  <circle cx="15" cy="29.5" r="3" fill="#c4a8bc"/>

  <!-- left ear -->
  <path d="M10 30 L18 8 L35 24" fill="#8094a8"/>
  <path d="M13 28 L20 12 L32 23" fill="#f0a4b8"/>

  <!-- right ear -->
  <path d="M70 30 L62 8 L45 24" fill="#8094a8"/>
  <path d="M67 28 L60 12 L48 23" fill="#f0a4b8"/>

  <!-- head -->
  <circle cx="40" cy="40" r="30" fill="url(#fg)"/>

  <!-- eye whites -->
  <ellipse cx="27" cy="36" rx="9.5" ry="10" fill="white"/>
  <ellipse cx="53" cy="36" rx="9.5" ry="10" fill="white"/>

  <!-- wink left (normal eye) -->
  <circle cx="28.5" cy="37" r="7" fill="url(#eg)"/>
  <circle cx="54.5" cy="37" r="7" fill="url(#eg)"/>

  <!-- eye highlights -->
  <circle cx="30.5" cy="33.5" r="2.6" fill="white"/>
  <circle cx="56.5" cy="33.5" r="2.6" fill="white"/>
  <circle cx="27" cy="40" r="1.3" fill="white" opacity="0.4"/>
  <circle cx="53" cy="40" r="1.3" fill="white" opacity="0.4"/>

  <!-- cheeks -->
  <ellipse cx="15" cy="47" rx="8.5" ry="5.5" fill="#fda4af" opacity="0.4"/>
  <ellipse cx="65" cy="47" rx="8.5" ry="5.5" fill="#fda4af" opacity="0.4"/>

  <!-- nose -->
  <path d="M36.5 50 L40 47 L43.5 50 L40 52 Z" fill="#c06080"/>

  <!-- mouth -->
  <path d="M33 56 Q40 62 47 56" stroke="#9f4060" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- whiskers left -->
  <line x1="0" y1="46" x2="26" y2="49" stroke="#7a8fa8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="0" y1="52" x2="26" y2="51" stroke="#7a8fa8" stroke-width="1.1" stroke-linecap="round"/>

  <!-- whiskers right -->
  <line x1="54" y1="49" x2="80" y2="46" stroke="#7a8fa8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="54" y1="51" x2="80" y2="52" stroke="#7a8fa8" stroke-width="1.1" stroke-linecap="round"/>
</svg>
