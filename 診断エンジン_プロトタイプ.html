  header {

    padding: 20px 24px;
    display: flex;
    align-items: center;

  header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  /* Progress */
  .progress-bar {
    background: var(--gray-200);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 28px;
  }
  .progress-fill {
    background: var(--primary);
    height: 6px;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .step-label { font-size: 12px; color: var(--gray-600); margin-bottom: 8px; }

  /* Card */
  .card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .card p.desc { font-size: 13px; color: var(--gray-600); margin-bottom: 16px; }

  /* Options */
  .option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .option-btn {
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    background: white;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .option-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .option-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .option-btn .emoji { display: block; font-size: 20px; margin-bottom: 4px; }

  /* Nav */
  .nav { display: flex; justify-content: space-between; margin-top: 24px; }
  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #1447c0; }
  .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
  .btn-secondary:hover { background: var(--gray-200); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Results */
  .results-header {
    background: linear-gradient(135deg, var(--primary) 0%, #0e47c0 100%);
    color: white;
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    text-align: center;
  }
  .results-header h2 { font-size: 22px; margin-bottom: 8px; }
  .results-header p { opacity: 0.9; font-size: 14px; }
  .total-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 99px;
    padding: 6px 18px;
    font-size: 24px;
    font-weight: 700;
    margin: 12px 0 4px;
  }

  /* Stacking panel */
  .stack-panel {
    background: var(--accent-light);
    border: 1px solid #aadbc8;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .stack-panel h3 { font-size: 15px; font-weight: 700; color: #065f46; margin-bottom: 12px; }
  .stack-flow { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .stack-item {
    background: white;
    border: 1px solid #6ee7b7;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    color: #065f46;
  }
  .stack-arrow { font-size: 16px; color: #059669; }
  .stack-total { font-size: 15px; font-weight: 700; color: #065f46; margin-top: 4px; }

  .conflict-panel {
    background: var(--warning-light);
    border: 1px solid #fcd9bd;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #9a3412;

    margin-bottom: 12px;
    overflow: hidden;

    padding: 16px 20px;

    color: var(--primary);

    font-size: 14px;

    justify-content: center;

  .subsidy-card-title h4 { font-size: 15px; font-weight: 700; }
  .subsidy-card-title .tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .tag {

    background: var(--gray-100);

  .subsidy-amount {
    text-align: right;

  .subsidy-amount .amount { font-size: 18px; font-weight: 700; color: var(--primary); }
  .subsidy-amount .label { font-size: 11px; color: var(--gray-600); }

    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--gray-100);

  .subsidy-detail.open { display: block; }

  .detail-item { }
  .detail-item .label { font-size: 11px; color: var(--gray-600); margin-bottom: 2px; }
  .detail-item .value { font-size: 14px; font-weight: 600; }

    margin-top: 14px;
    background: var(--gray-50);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
  }
  .match-reasons strong { display: block; margin-bottom: 6px; color: var(--gray-700); }
  .match-tag {
    display: inline-block;
    background: #d1fae5;
    color: #065f46;
    border-radius: 4px;
    padding: 2px 8px;
    margin: 2px;
    font-size: 12px;
  }

  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .compare-table th {

    text-align: left;

    border-bottom: 2px solid var(--gray-200);
    font-size: 12px;

    width: 8px; height: 8px;

  .reset-btn button {

    color: var(--gray-600);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;

  .hidden { display: none; }

let currentStep = 0;
let answers = {}; // { stepId: [values] }

function getSelectedForStep(stepId) {
  return answers[stepId] || [];
}

function renderStep() {
  const step = STEPS[currentStep];
  const total = STEPS.length;
  const pct = Math.round(((currentStep + 1) / (total + 1)) * 100);

  document.getElementById('step-label').textContent = `ステップ ${currentStep + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = pct + '%';

  const selected = getSelectedForStep(step.id);

  const html = `
    <div class="card">
      <h2>${step.title.replace(/\n/g, '<br>')}</h2>
      ${step.desc ? `<p class="desc">${step.desc}</p>` : ''}
      <div class="option-grid">
        ${step.options.map(opt => `
          <button class="option-btn ${selected.includes(opt.value) ? 'selected' : ''}"
                  onclick="selectOption('${step.id}', '${opt.value}', ${step.multi})">
            <span class="emoji">${opt.emoji}</span>
            ${opt.label.replace(/\n/g, '<br>')}
          </button>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('questions-container').innerHTML = html;

  document.getElementById('back-btn').disabled = currentStep === 0;
  document.getElementById('next-btn').textContent =
    currentStep === total - 1 ? '診断する 🔍' : '次へ →';
}

function selectOption(stepId, value, multi) {
  if (!answers[stepId]) answers[stepId] = [];

  if (value.startsWith('none_')) {
    // Selecting "none" clears everything else
    answers[stepId] = [value];
  } else {
    // Remove "none" if selecting real option
    answers[stepId] = answers[stepId].filter(v => !v.startsWith('none_'));

    if (multi) {
      const idx = answers[stepId].indexOf(value);
      if (idx >= 0) answers[stepId].splice(idx, 1);
      else answers[stepId].push(value);
    } else {
      answers[stepId] = [value];
    }
  }
  renderStep();
}

function goNext() {
  const step = STEPS[currentStep];
  if (!answers[step.id] || answers[step.id].length === 0) {
    alert('選択肢を1つ以上選んでください');
    return;
  }
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep();
  } else {
    showResults();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

function scoreSubsidies() {
  // Collect all selected values
  const allSelected = Object.values(answers).flat().filter(v => !v.startsWith('none_'));
  const companySizes = answers['company_size'] || [];

  const scored = SUBSIDIES.map(s => {
    // Filter by company size
    if (!s.company_size.some(sz => companySizes.includes(sz))) return null;

    // Score: count matching triggers
    const matchedTriggers = s.triggers.filter(t =>
      allSelected.some(sel => sel.includes(t) || t.includes(sel))
    );

    if (matchedTriggers.length === 0) return null;

    return { ...s, score: matchedTriggers.length, matchedTriggers };
  }).filter(Boolean);

  scored.sort((a, b) => b.score - a.score || b.max_amount - a.max_amount);
  return scored;
}

// Build stacking combinations
function buildStackingCombos(scored) {
  const scoredIds = scored.map(s => s.id);
  const combos = [];

  // Known powerful stacking patterns
  const patterns = [
    // Disabled worker full path: trial → tokutei → career-up
    ["trial-shogaisha", "tokutei-shushokukonnansha", "career-up-shogaisha-seishainuka"],
    // Disabled short-time path
    ["trial-shogaisha-tanjikan", "trial-shogaisha", "tokutei-shushokukonnansha", "career-up-shogaisha-seishainuka"],
    // General hire path
    ["trial-ippan", "tokutei-hyogaki"],
    ["trial-ippan", "tokutei-shushokukonnansha"],
    // Career-up combos
    ["career-up-seishainuka", "career-up-chingin-kaitei"],
    ["career-up-seishainuka", "career-up-shoyo-taishokukin"],
    ["career-up-seishainuka", "career-up-chingin-kaitei", "career-up-shoyo-taishokukin"],
    // New business + reskilling
    ["jigyo-saikochiku", "jinzai-reskilling"],
    // Wage + equipment
    ["gyomu-kaizen", "career-up-chingin-kaitei"],
    //育休combos
    ["ryoritsu-papa-shien", "ryoritsu-ikukyu-kouhyo"],
    ["ryoritsu-ikukyu-shien", "ryoritsu-ikukyu-kouhyo"],
    ["ryoritsu-papa-shien", "ryoritsu-ikukyu-shien", "ryoritsu-ikukyu-kouhyo"],
    // Training
    ["jinzai-ikusei-shien", "tokutei-hyogaki"],
    ["jinzai-ikusei-shien", "tokutei-shogai-genkyu"],
  ];

  patterns.forEach(pattern => {
    const available = pattern.filter(id => scoredIds.includes(id));
    if (available.length >= 2) {
      const items = available.map(id => scored.find(s => s.id === id));
      const total = items.reduce((sum, s) => sum + s.max_amount, 0);
      combos.push({ items, total });
    }
  });

  // Sort by total
  combos.sort((a, b) => b.total - a.total);
  return combos.slice(0, 3); // Top 3 combos
}

// Detect conflicts
function detectConflicts(scored) {
  const conflicts = [];
  scored.forEach(s => {
    s.incompatible_with.forEach(otherId => {
      const other = scored.find(x => x.id === otherId);
      if (other) {
        const pair = [s.id, otherId].sort().join('|');
        if (!conflicts.find(c => c.pair === pair)) {
          conflicts.push({ pair, a: s, b: other });
        }
      }
    });
  });
  return conflicts;
}

      <h2>🎯 診断結果</h2>
      <p>${scored.length}件の助成金・補助金が該当しました</p>
      <div class="total-badge">${scored.length > 0 ? '最大 ' + formatAmount(totalMax) + ' 受給可能' : '該当なし'}</div>
      <p style="font-size:12px;opacity:0.75;margin-top:6px">※併用・組み合わせによる概算。要件確認が必要です</p>
    </div>
  `;

  // Stacking combos
  if (combos.length > 0) {
    html += `<div class="stack-panel"><h3>⚡ おすすめ組み合わせ（スタッキング）</h3>`;
    combos.forEach(combo => {
      html += `
        <div style="margin-bottom:14px">
          <div class="stack-flow">
            ${combo.items.map((item, i) => `
              ${i > 0 ? '<span class="stack-arrow">→</span>' : ''}
              <div class="stack-item">${item.name}</div>
            `).join('')}
          </div>
          <div class="stack-total">合計最大: ${formatAmount(combo.total)}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Conflicts
  if (conflicts.length > 0) {
    html += `<div class="conflict-panel"><strong>⚠️ 注意：同時申請できない組み合わせがあります</strong>`;
    conflicts.forEach(c => {
      html += `<div>• 「${c.a.name}」と「${c.b.name}」は同一採用案件に対して併用不可</div>`;
    });
    html += `</div>`;
  }

  // Ranked subsidies
  if (scored.length > 0) {
    html += `<div class="card"><h2>📋 マッチした助成金・補助金一覧</h2>`;
    scored.forEach((s, i) => {
      html += renderSubsidyCard(s, i);
    });
    html += `</div>`;
  } else {
    html += `<div class="card"><p>選択内容に該当する助成金・補助金が見つかりませんでした。別の条件で再診断してみてください。</p></div>`;
  }

  // Comparison table
  if (scored.length >= 2) {
    html += renderComparisonTable(scored.slice(0, 8));
  }

  // Reset
  html += `
    <div class="reset-btn">
      <button onclick="resetDiagnosis()">🔄 最初からやり直す</button>
    </div>
  `;

  resultsSection.innerHTML = html;
}

function renderSubsidyCard(s, i) {
  const diffLabel = ['', '易', '中', '難'][s.difficulty];
  const diffColor = ['', 'd1', 'd2', 'd3'][s.difficulty];

  return `
    <div class="subsidy-card">
      <div class="subsidy-card-header" onclick="toggleDetail('detail-${s.id}')">
        <div class="rank-badge ${i < 3 ? 'top' : ''}">${i + 1}</div>
        <div class="subsidy-card-title">
          <h4>${s.name}</h4>
          <div class="tags">
            ${s.parent ? `<span class="tag blue">${s.parent}</span>` : ''}
            <span class="tag green">${difficultyLabel(s.difficulty)}</span>
            <span class="tag">${timingLabel(s.application_timing)}</span>
            <span class="tag">準備期間 約${s.lead_time_months}ヶ月</span>
          </div>
        </div>
        <div class="subsidy-amount">
          <div class="amount">${formatAmount(s.max_amount)}</div>
          <div class="label">最大受給額</div>
        </div>
      </div>
      <div class="subsidy-detail" id="detail-${s.id}">
        <div class="match-reasons">
          <strong>✅ マッチした理由</strong>
          ${s.matchedTriggers.map(t => `<span class="match-tag">${t}</span>`).join('')}
        </div>
        <div class="detail-grid">
          <div class="detail-item">
            <div class="label">助成額の内訳</div>
            <div class="value" style="font-size:13px">${s.amount_note}</div>
          </div>
          <div class="detail-item">
            <div class="label">申請タイミング</div>
            <div class="value" style="font-size:13px">${timingDetailLabel(s.application_timing)}</div>
          </div>
          ${s.compatible_with.length > 0 ? `
          <div class="detail-item" style="grid-column:1/-1">
            <div class="label">一緒に使える助成金</div>
            <div style="margin-top:4px">
              ${s.compatible_with.map(id => {
                const other = SUBSIDIES.find(x => x.id === id);
                return other ? `<span class="match-tag" style="background:#dbeafe;color:#1e40af">${other.name}</span>` : '';
              }).join('')}
            </div>
          </div>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

function renderComparisonTable(items) {
  return `
    <div class="card">
      <h2>📊 比較表</h2>
      <div style="overflow-x:auto">
        <table class="compare-table">
          <thead>
            <tr>
              <th>助成金名</th>
              <th>最大受給額</th>
              <th>難易度</th>
              <th>準備期間</th>
              <th>申請タイミング</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(s => `
              <tr>
                <td style="font-weight:600;font-size:12px">${s.name}</td>
                <td style="font-weight:700;color:var(--primary)">${formatAmount(s.max_amount)}</td>
                <td>
                  ${[1,2,3].map(n => `<span class="difficulty-dot ${n <= s.difficulty ? ['','d1','d2','d3'][s.difficulty] : ''}" style="${n <= s.difficulty ? '' : 'opacity:0.2'}"></span>`).join('')}
                  ${difficultyLabel(s.difficulty)}
                </td>
                <td>約${s.lead_time_months}ヶ月</td>
                <td style="font-size:12px">${timingLabel(s.application_timing)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function resetDiagnosis() {
  currentStep = 0;
  answers = {};
  document.getElementById('hearing-section').classList.remove('hidden');
  document.getElementById('results-section').classList.add('hidden');
  renderStep();
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function formatAmount(n) {
  if (n >= 10000000) return (n / 10000000).toFixed(0) + '億円';
  if (n >= 10000) return (n / 10000).toFixed(0) + '万円';
  return n.toLocaleString() + '円';
}

function difficultyLabel(d) {
  return ['', '易(★☆☆)', '中(★★☆)', '難(★★★)'][d];
}

function timingLabel(t) {
  const map = {
    before_hire: '採用前',
    after_hire: '採用後',
    before_investment: '設備投資前',
    before_training: '研修開始前',
    after_return: '復帰後',
    after_leave: '休業後',
    after_raise: '賃上げ後',
    after_change: '制度変更後',
    after_payment: '支給後',
    after_publish: '公表後',
    before_facility: '設置前',
  };
  return map[t] || t;
}

function timingDetailLabel(t) {
  const map = {
    before_hire: '雇い入れ前に申請が必要',
    after_hire: '雇い入れ後に申請（2週間以内など期限あり）',
    before_investment: '設備投資・発注前に申請が必要',
    before_training: '研修開始1ヶ月前に申請が必要',
    after_return: '育休・介護休業からの復帰後に申請',
    after_leave: '休業実施後に申請',
    after_raise: '賃上げ実施後に申請',
    after_change: '制度変更・実施後に申請',
    after_payment: '賞与等の支給後に申請',
    after_publish: '情報公表後に申請',
    before_facility: '施設設置前に計画申請が必要',
  };
  return map[t] || t;
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderStep();
</script>
</body>
</html>
